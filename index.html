<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Crystal Gobblet Gobblers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DynaPuff', 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d1b4e 100%);
            overflow: hidden;
            color: white;
        }

        #gameCanvas {
            width: 100%;
            height: 100vh;
            display: block;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #turnIndicator {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            pointer-events: none;
            transition: color 0.3s;
        }

        #statusMessage {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
            pointer-events: none;
        }

        #resetButton {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            color: white;
            cursor: pointer;
            pointer-events: all;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        #resetButton:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateX(-50%) scale(1.05);
        }

        #toggleButtons {
            position: absolute;
            top: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: all;
        }

        .toggle-btn {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .toggle-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }


        .winner-announcement {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="turnIndicator">Orange's Turn</div>
        <div id="statusMessage">Select a piece to place or move</div>
        <div id="toggleButtons">
            <button class="toggle-btn" id="opacityToggle">Toggle Opacity</button>
        </div>
        <button id="resetButton">Reset Game</button>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ===== GAME STATE =====
        const PLAYER_ORANGE = 0;
        const PLAYER_BLUE = 1;
        const SIZE_SMALL = 0;
        const SIZE_MEDIUM = 1;
        const SIZE_LARGE = 2;

        class GameState {
            constructor() {
                this.currentPlayer = PLAYER_ORANGE;
                this.winner = null;
                this.gameOver = false;
                this.winningPieces = [];
                this.board = Array(3).fill(null).map(() => Array(3).fill(null).map(() => []));

                // Each player has 6 pieces: 2 small, 2 medium, 2 large
                this.reserves = {
                    [PLAYER_ORANGE]: [
                        { size: SIZE_SMALL, player: PLAYER_ORANGE, mesh: null, inReserve: true },
                        { size: SIZE_SMALL, player: PLAYER_ORANGE, mesh: null, inReserve: true },
                        { size: SIZE_MEDIUM, player: PLAYER_ORANGE, mesh: null, inReserve: true },
                        { size: SIZE_MEDIUM, player: PLAYER_ORANGE, mesh: null, inReserve: true },
                        { size: SIZE_LARGE, player: PLAYER_ORANGE, mesh: null, inReserve: true },
                        { size: SIZE_LARGE, player: PLAYER_ORANGE, mesh: null, inReserve: true }
                    ],
                    [PLAYER_BLUE]: [
                        { size: SIZE_SMALL, player: PLAYER_BLUE, mesh: null, inReserve: true },
                        { size: SIZE_SMALL, player: PLAYER_BLUE, mesh: null, inReserve: true },
                        { size: SIZE_MEDIUM, player: PLAYER_BLUE, mesh: null, inReserve: true },
                        { size: SIZE_MEDIUM, player: PLAYER_BLUE, mesh: null, inReserve: true },
                        { size: SIZE_LARGE, player: PLAYER_BLUE, mesh: null, inReserve: true },
                        { size: SIZE_LARGE, player: PLAYER_BLUE, mesh: null, inReserve: true }
                    ]
                };

                this.selectedPiece = null;
                this.selectedCell = null;
            }

            isValidMove(piece, targetRow, targetCol) {
                if (this.gameOver) return false;

                const targetCell = this.board[targetRow][targetCol];

                // Check if piece can be placed on target
                if (targetCell.length === 0) {
                    return true; // Empty cell, always valid
                }

                const topPiece = targetCell[targetCell.length - 1];
                return piece.size > topPiece.size; // Can only gobble smaller pieces
            }

            canMovePiece(piece) {
                // If piece is in reserve, it can be placed if it's the current player's piece
                if (piece.inReserve) {
                    return piece.player === this.currentPlayer;
                }

                // If piece is on board, check if it's on top of its stack
                for (let row = 0; row < 3; row++) {
                    for (let col = 0; col < 3; col++) {
                        const stack = this.board[row][col];
                        if (stack.length > 0 && stack[stack.length - 1] === piece) {
                            return piece.player === this.currentPlayer;
                        }
                    }
                }

                return false;
            }

            getPieceLocation(piece) {
                for (let row = 0; row < 3; row++) {
                    for (let col = 0; col < 3; col++) {
                        const stack = this.board[row][col];
                        const index = stack.indexOf(piece);
                        if (index !== -1) {
                            return { row, col, stackIndex: index };
                        }
                    }
                }
                return null;
            }

            movePiece(piece, targetRow, targetCol) {
                // Remove piece from current location
                const currentLocation = this.getPieceLocation(piece);
                if (currentLocation) {
                    this.board[currentLocation.row][currentLocation.col].splice(currentLocation.stackIndex, 1);
                }

                if (piece.inReserve) {
                    piece.inReserve = false;
                }

                // Add piece to target location
                this.board[targetRow][targetCol].push(piece);
            }

            checkWinner() {
                // Check all rows, columns, and diagonals
                for (let i = 0; i < 3; i++) {
                    // Check row
                    if (this.checkLine(this.board[i][0], this.board[i][1], this.board[i][2])) {
                        return true;
                    }
                    // Check column
                    if (this.checkLine(this.board[0][i], this.board[1][i], this.board[2][i])) {
                        return true;
                    }
                }

                // Check diagonals
                if (this.checkLine(this.board[0][0], this.board[1][1], this.board[2][2])) {
                    return true;
                }
                if (this.checkLine(this.board[0][2], this.board[1][1], this.board[2][0])) {
                    return true;
                }

                return false;
            }

            checkLine(cell1, cell2, cell3) {
                if (cell1.length === 0 || cell2.length === 0 || cell3.length === 0) {
                    return false;
                }

                const top1 = cell1[cell1.length - 1];
                const top2 = cell2[cell2.length - 1];
                const top3 = cell3[cell3.length - 1];

                if (top1.player === top2.player && top2.player === top3.player) {
                    this.winner = top1.player;
                    this.gameOver = true;
                    this.winningPieces = [top1, top2, top3];
                    return true;
                }

                return false;
            }

            switchPlayer() {
                this.currentPlayer = this.currentPlayer === PLAYER_ORANGE ? PLAYER_BLUE : PLAYER_ORANGE;
            }

            reset() {
                this.currentPlayer = PLAYER_ORANGE;
                this.winner = null;
                this.gameOver = false;
                this.winningPieces = [];
                this.board = Array(3).fill(null).map(() => Array(3).fill(null).map(() => []));
                this.selectedPiece = null;
                this.selectedCell = null;

                // Reset all pieces to reserves
                for (let player in this.reserves) {
                    this.reserves[player].forEach(piece => {
                        piece.inReserve = true;
                    });
                }
            }
        }

        // ===== THREE.JS SETUP =====
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({
            canvas: document.getElementById('gameCanvas'),
            antialias: true,
            alpha: true
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 8;
        controls.maxDistance = 20;
        controls.maxPolarAngle = Math.PI / 2.2;

        // ===== LIGHTING =====
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const hemisphereLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.4);
        scene.add(hemisphereLight);

        const mainLight = new THREE.DirectionalLight(0xffffff, 1.0);
        mainLight.position.set(5, 10, 5);
        mainLight.castShadow = true;
        mainLight.shadow.camera.left = -10;
        mainLight.shadow.camera.right = 10;
        mainLight.shadow.camera.top = 10;
        mainLight.shadow.camera.bottom = -10;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        scene.add(mainLight);

        const pointLight1 = new THREE.PointLight(0xff6b35, 0.5, 20);
        pointLight1.position.set(-3, 6, 3);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0x4ecdc4, 0.5, 20);
        pointLight2.position.set(3, 6, 3);
        scene.add(pointLight2);

        const spotLight = new THREE.SpotLight(0xffffff, 1.5);
        spotLight.position.set(0, 12, 0);
        spotLight.angle = Math.PI / 4;
        spotLight.penumbra = 0.3;
        spotLight.castShadow = true;
        scene.add(spotLight);

        // ===== GAME BOARD =====
        const boardGroup = new THREE.Group();
        scene.add(boardGroup);

        const boardMaterial = new THREE.MeshStandardMaterial({
            color: 0x0a0a1a,
            roughness: 0.2,
            metalness: 0.8
        });

        const cellSize = 2;
        const cellGap = 0.1;
        const cellMeshes = [];

        for (let row = 0; row < 3; row++) {
            cellMeshes[row] = [];
            for (let col = 0; col < 3; col++) {
                const cellGeometry = new THREE.BoxGeometry(cellSize - cellGap, 0.2, cellSize - cellGap);
                const cellMesh = new THREE.Mesh(cellGeometry, boardMaterial);

                const x = (col - 1) * cellSize;
                const z = (row - 1) * cellSize;
                cellMesh.position.set(x, -0.1, z);
                cellMesh.receiveShadow = true;
                cellMesh.userData = { type: 'cell', row, col };

                boardGroup.add(cellMesh);
                cellMeshes[row][col] = cellMesh;

                // Add grid lines
                const edges = new THREE.EdgesGeometry(cellGeometry);
                const lineMaterial = new THREE.LineBasicMaterial({ color: 0x4a4a6a, linewidth: 2 });
                const wireframe = new THREE.LineSegments(edges, lineMaterial);
                cellMesh.add(wireframe);
            }
        }

        // ===== CRYSTAL GOBLET PIECES =====
        function createCrystalMaterial(color, emissiveColor) {
            return new THREE.MeshPhysicalMaterial({
                color: color,
                emissive: emissiveColor,
                emissiveIntensity: 0.3,
                transmission: 0.9,
                roughness: 0.1,
                metalness: 0.1,
                thickness: 0.5,
                clearcoat: 1.0,
                clearcoatRoughness: 0.1,
                ior: 1.5,
                transparent: true,
                opacity: 0.95,
                side: THREE.DoubleSide
            });
        }

        function createGobletGeometry(size) {
            const params = {
                [SIZE_SMALL]: { radiusTop: 0.25, radiusBottom: 0.35, height: 0.4 },
                [SIZE_MEDIUM]: { radiusTop: 0.45, radiusBottom: 0.65, height: 0.7 },
                [SIZE_LARGE]: { radiusTop: 0.65, radiusBottom: 0.95, height: 1.0 }
            }[size];

            const geometry = new THREE.CylinderGeometry(
                params.radiusTop,
                params.radiusBottom,
                params.height,
                32
            );

            return geometry;
        }

        function createPieceMesh(piece) {
            const geometry = createGobletGeometry(piece.size);
            const color = piece.player === PLAYER_ORANGE ? 0xff6b35 : 0x4ecdc4;
            const material = createCrystalMaterial(color, color);
            const mesh = new THREE.Mesh(geometry, material);

            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.userData = { type: 'piece', piece: piece };

            return mesh;
        }

        // ===== GAME INITIALIZATION =====
        const gameState = new GameState();
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredObject = null;
        const validCellIndicators = [];
        let isAnimating = false;
        let isOpaque = false;

        // Create all pieces and position them in reserves
        function initializePieces() {
            const reserveOffsetX = 8;
            const reserveZ = 0;
            const spacing = 1.6;

            // Orange pieces (left side)
            gameState.reserves[PLAYER_ORANGE].forEach((piece, index) => {
                const mesh = createPieceMesh(piece);
                piece.mesh = mesh;

                const row = Math.floor(index / 2);
                const col = index % 2;

                // Position based on piece size to avoid clipping through board
                // Height is centered, so we need position = height/2 to sit on ground
                // Small: height 0.4, so position at 0.2
                // Medium: height 0.7, so position at 0.35
                // Large: height 1.0, so position at 0.5
                const heightOffset = piece.size === SIZE_SMALL ? 0.2 : (piece.size === SIZE_MEDIUM ? 0.35 : 0.5);
                mesh.position.set(-reserveOffsetX - col * spacing, heightOffset, -2 + row * spacing);

                scene.add(mesh);
            });

            // Blue pieces (right side)
            gameState.reserves[PLAYER_BLUE].forEach((piece, index) => {
                const mesh = createPieceMesh(piece);
                piece.mesh = mesh;

                const row = Math.floor(index / 2);
                const col = index % 2;

                // Position based on piece size to avoid clipping through board
                // Height is centered, so we need position = height/2 to sit on ground
                const heightOffset = piece.size === SIZE_SMALL ? 0.2 : (piece.size === SIZE_MEDIUM ? 0.35 : 0.5);
                mesh.position.set(reserveOffsetX + col * spacing, heightOffset, -2 + row * spacing);

                scene.add(mesh);
            });
        }

        initializePieces();

        // ===== INTERACTION =====
        function updateMousePosition(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        }

        function getIntersectedObject() {
            raycaster.setFromCamera(mouse, camera);

            const pieceMeshes = [];
            for (let player in gameState.reserves) {
                gameState.reserves[player].forEach(piece => {
                    if (piece.mesh && piece.mesh.visible) {
                        pieceMeshes.push(piece.mesh);
                    }
                });
            }

            const boardObjects = cellMeshes.flat();
            const allObjects = [...pieceMeshes, ...boardObjects];

            const intersects = raycaster.intersectObjects(allObjects, false);
            return intersects.length > 0 ? intersects[0].object : null;
        }

        function showValidCells(piece) {
            clearValidCellIndicators();

            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 3; col++) {
                    if (gameState.isValidMove(piece, row, col)) {
                        const cellMesh = cellMeshes[row][col];

                        const geometry = new THREE.RingGeometry(0.6, 0.8, 32);
                        const material = new THREE.MeshBasicMaterial({
                            color: piece.player === PLAYER_ORANGE ? 0xff6b35 : 0x4ecdc4,
                            transparent: true,
                            opacity: 0.5,
                            side: THREE.DoubleSide
                        });
                        const indicator = new THREE.Mesh(geometry, material);
                        indicator.rotation.x = -Math.PI / 2;
                        indicator.position.y = 0.15;

                        cellMesh.add(indicator);
                        validCellIndicators.push(indicator);
                    }
                }
            }
        }

        function clearValidCellIndicators() {
            validCellIndicators.forEach(indicator => {
                indicator.parent.remove(indicator);
            });
            validCellIndicators.length = 0;
        }

        function highlightPiece(mesh, intensity = 0.6) {
            if (mesh && mesh.material) {
                mesh.material.emissiveIntensity = intensity;
            }
        }

        function unhighlightPiece(mesh) {
            if (mesh && mesh.material) {
                mesh.material.emissiveIntensity = 0.3;
            }
        }

        function animatePieceToCell(piece, targetRow, targetCol, callback) {
            isAnimating = true;
            const mesh = piece.mesh;
            const startPos = mesh.position.clone();

            const x = (targetCol - 1) * cellSize;
            const z = (targetRow - 1) * cellSize;

            // Calculate stack height
            const stackHeight = gameState.board[targetRow][targetCol].length;
            const heightOffset = stackHeight * 0.15;
            const y = heightOffset;

            const duration = 800;
            const startTime = Date.now();
            const peakHeight = 3;

            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);

                const easeProgress = progress < 0.5
                    ? 2 * progress * progress
                    : 1 - Math.pow(-2 * progress + 2, 2) / 2;

                mesh.position.x = startPos.x + (x - startPos.x) * easeProgress;
                mesh.position.z = startPos.z + (z - startPos.z) * easeProgress;

                const heightProgress = Math.sin(progress * Math.PI);
                mesh.position.y = startPos.y + heightProgress * peakHeight + (y - startPos.y) * progress;

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    mesh.position.set(x, y, z);
                    isAnimating = false;
                    if (callback) callback();
                }
            }

            animate();
        }

        function updateStackVisibility(row, col) {
            const stack = gameState.board[row][col];
            stack.forEach((piece, index) => {
                const isTop = index === stack.length - 1;
                piece.mesh.visible = isTop || index === stack.length - 2;

                if (!isTop && piece.mesh.visible) {
                    piece.mesh.material.opacity = 0.3;
                } else if (isTop) {
                    piece.mesh.material.opacity = 0.95;
                }
            });
        }

        function handlePieceClick(piece) {
            if (isAnimating || gameState.gameOver) return;

            // If a piece is already selected and user clicks an opponent's piece on the board, treat it as clicking that cell
            if (gameState.selectedPiece && !piece.inReserve && piece.player !== gameState.currentPlayer) {
                const location = gameState.getPieceLocation(piece);
                if (location) {
                    handleCellClick(location.row, location.col);
                    return;
                }
            }

            if (!gameState.canMovePiece(piece)) {
                if (piece.player !== gameState.currentPlayer) {
                    updateStatus("That's not your piece!");
                } else {
                    updateStatus("That piece is covered!");
                }
                return;
            }

            if (gameState.selectedPiece === piece) {
                // Deselect
                unhighlightPiece(piece.mesh);
                gameState.selectedPiece = null;
                clearValidCellIndicators();
                updateStatus("Select a piece to place or move");
            } else {
                // Select new piece
                if (gameState.selectedPiece) {
                    unhighlightPiece(gameState.selectedPiece.mesh);
                }

                gameState.selectedPiece = piece;
                highlightPiece(piece.mesh, 0.8);
                showValidCells(piece);
                updateStatus("Choose where to place this piece");
            }
        }

        function handleCellClick(row, col) {
            if (isAnimating || gameState.gameOver) return;

            if (!gameState.selectedPiece) {
                updateStatus("Select a piece first!");
                return;
            }

            const piece = gameState.selectedPiece;

            // Check if trying to move to same location
            const currentLoc = gameState.getPieceLocation(piece);
            if (currentLoc && currentLoc.row === row && currentLoc.col === col) {
                updateStatus("Cannot stay in the same place!");
                return;
            }

            if (!gameState.isValidMove(piece, row, col)) {
                const targetCell = gameState.board[row][col];
                if (targetCell.length > 0) {
                    const topPiece = targetCell[targetCell.length - 1];
                    if (piece.size <= topPiece.size) {
                        updateStatus("You must cover this piece with a bigger piece!");
                        return;
                    }
                }
                updateStatus("Invalid move!");
                return;
            }

            unhighlightPiece(piece.mesh);
            clearValidCellIndicators();

            gameState.movePiece(piece, row, col);

            animatePieceToCell(piece, row, col, () => {
                updateStackVisibility(row, col);

                if (gameState.checkWinner()) {
                    handleWin();
                } else {
                    gameState.switchPlayer();
                    gameState.selectedPiece = null;
                    updateTurnIndicator();
                    updateStatus("Select a piece to place or move");
                }
            });
        }

        const winningPiecesAnimations = new Set();

        function handleWin() {
            const winnerName = gameState.winner === PLAYER_ORANGE ? "Orange" : "Blue";
            updateStatus(`${winnerName} Wins!`, true);

            const turnIndicator = document.getElementById('turnIndicator');
            turnIndicator.classList.add('winner-announcement');

            winningPiecesAnimations.clear();

            // Animate only the winning pieces (the 3 in a row)
            if (gameState.winningPieces && gameState.winningPieces.length === 3) {
                gameState.winningPieces.forEach(piece => {
                    winningPiecesAnimations.add(piece.mesh);
                    animateWinningPiece(piece.mesh);
                });
            }
        }

        function animateWinningPiece(mesh) {
            const startIntensity = 0.3;
            const maxIntensity = 1.2;
            const animState = { increasing: true };

            function pulse() {
                if (!gameState.gameOver || !winningPiecesAnimations.has(mesh)) return;

                const current = mesh.material.emissiveIntensity;

                if (animState.increasing) {
                    mesh.material.emissiveIntensity = Math.min(current + 0.02, maxIntensity);
                    if (mesh.material.emissiveIntensity >= maxIntensity) animState.increasing = false;
                } else {
                    mesh.material.emissiveIntensity = Math.max(current - 0.02, startIntensity);
                    if (mesh.material.emissiveIntensity <= startIntensity) animState.increasing = true;
                }

                requestAnimationFrame(pulse);
            }

            pulse();
        }

        // ===== UI UPDATES =====
        function updateTurnIndicator() {
            const turnIndicator = document.getElementById('turnIndicator');
            const playerName = gameState.currentPlayer === PLAYER_ORANGE ? "Orange" : "Blue";
            const color = gameState.currentPlayer === PLAYER_ORANGE ? "#ff6b35" : "#4ecdc4";

            turnIndicator.textContent = `${playerName}'s Turn`;
            turnIndicator.style.color = color;
        }

        function updateStatus(message, isWinner = false) {
            const statusMessage = document.getElementById('statusMessage');
            statusMessage.textContent = message;

            if (isWinner) {
                const color = gameState.winner === PLAYER_ORANGE ? "#ff6b35" : "#4ecdc4";
                statusMessage.style.color = color;
                statusMessage.style.fontSize = "24px";
            } else {
                statusMessage.style.color = "white";
                statusMessage.style.fontSize = "18px";
            }
        }

        function resetGame() {
            // Clear animations
            gameState.reset();
            clearValidCellIndicators();

            // Reset all piece positions
            const reserveOffsetX = 8;
            const spacing = 1.6;

            gameState.reserves[PLAYER_ORANGE].forEach((piece, index) => {
                const row = Math.floor(index / 2);
                const col = index % 2;
                // Height is centered, so position = height/2 to sit on ground
                const heightOffset = piece.size === SIZE_SMALL ? 0.2 : (piece.size === SIZE_MEDIUM ? 0.35 : 0.5);
                piece.mesh.position.set(-reserveOffsetX - col * spacing, heightOffset, -2 + row * spacing);
                piece.mesh.visible = true;
                piece.mesh.material.opacity = 0.95;
                unhighlightPiece(piece.mesh);
            });

            gameState.reserves[PLAYER_BLUE].forEach((piece, index) => {
                const row = Math.floor(index / 2);
                const col = index % 2;
                // Height is centered, so position = height/2 to sit on ground
                const heightOffset = piece.size === SIZE_SMALL ? 0.2 : (piece.size === SIZE_MEDIUM ? 0.35 : 0.5);
                piece.mesh.position.set(reserveOffsetX + col * spacing, heightOffset, -2 + row * spacing);
                piece.mesh.visible = true;
                piece.mesh.material.opacity = 0.95;
                unhighlightPiece(piece.mesh);
            });

            // Reset UI
            const turnIndicator = document.getElementById('turnIndicator');
            turnIndicator.classList.remove('winner-announcement');
            updateTurnIndicator();
            updateStatus("Select a piece to place or move");

            isAnimating = false;
        }

        // ===== EVENT LISTENERS =====
        renderer.domElement.addEventListener('mousemove', (event) => {
            updateMousePosition(event);

            if (isAnimating || gameState.gameOver) return;

            const intersected = getIntersectedObject();

            if (hoveredObject !== intersected) {
                if (hoveredObject && hoveredObject.userData.type === 'piece') {
                    const piece = hoveredObject.userData.piece;
                    if (piece !== gameState.selectedPiece) {
                        unhighlightPiece(hoveredObject);
                    }
                }

                hoveredObject = intersected;

                if (hoveredObject && hoveredObject.userData.type === 'piece') {
                    const piece = hoveredObject.userData.piece;
                    if (gameState.canMovePiece(piece) && piece !== gameState.selectedPiece) {
                        highlightPiece(hoveredObject, 0.5);
                    }
                }
            }

            renderer.domElement.style.cursor = hoveredObject ? 'pointer' : 'default';
        });

        renderer.domElement.addEventListener('click', (event) => {
            updateMousePosition(event);

            if (isAnimating || gameState.gameOver) return;

            const intersected = getIntersectedObject();

            if (intersected) {
                if (intersected.userData.type === 'piece') {
                    handlePieceClick(intersected.userData.piece);
                } else if (intersected.userData.type === 'cell') {
                    handleCellClick(intersected.userData.row, intersected.userData.col);
                }
            }
        });

        document.getElementById('resetButton').addEventListener('click', resetGame);

        document.getElementById('opacityToggle').addEventListener('click', () => {
            isOpaque = !isOpaque;

            for (let player in gameState.reserves) {
                gameState.reserves[player].forEach(piece => {
                    if (isOpaque) {
                        piece.mesh.material.transmission = 0;
                        piece.mesh.material.opacity = 1.0;
                        piece.mesh.material.transparent = false;
                    } else {
                        piece.mesh.material.transmission = 0.9;
                        piece.mesh.material.opacity = 0.95;
                        piece.mesh.material.transparent = true;
                    }
                    piece.mesh.material.needsUpdate = true;
                });
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ===== ANIMATION LOOP =====
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        animate();
        updateTurnIndicator();
    </script>
</body>
</html>
